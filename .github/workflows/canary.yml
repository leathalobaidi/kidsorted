name: KidSorted — live site canary

on:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours
  workflow_dispatch:

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Live page serves and initialises
        run: |
          node -e '
          const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
          async function probe() {
            const page = await fetch("https://kidsorted.co.uk/", { cache: "no-store" });
            const html = await page.text();
            const app = await fetch("https://kidsorted.co.uk/assets/app.js", { cache: "no-store" });
            const js = await app.text();
            return {
              pageStatus: page.status === 200,
              heroPresent: html.includes("Six weeks of summer"),
              plannerPresent: html.includes("plannerTable"),
              appStatus: app.status === 200,
              appIntact: js.includes("E17_PLANNER") && js.includes("data-pick-customcamp")
            };
          }
          (async () => {
            const attempts = 4;
            let checks = {};
            for (let i = 1; i <= attempts; i++) {
              try {
                checks = await probe();
                if (Object.values(checks).every(Boolean)) {
                  console.log(JSON.stringify(checks, null, 2));
                  console.log(`Canary green (attempt ${i}/${attempts}).`);
                  return;
                }
                console.error(`Attempt ${i}/${attempts} not yet healthy: ${JSON.stringify(checks)}`);
              } catch (e) {
                console.error(`Attempt ${i}/${attempts} threw: ${e.message}`);
              }
              if (i < attempts) await sleep(15000);
            }
            console.error(`Canary RED after ${attempts} attempts: ${JSON.stringify(checks, null, 2)}`);
            process.exit(1);
          })().catch((e) => { console.error(e); process.exit(1); });
          '
